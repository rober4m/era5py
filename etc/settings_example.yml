# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ERA-5 User Configuration  ← Edit this section before running
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ── Commands ─────────────────────────────────────────────────────────────────
# Run each step in order with:
#   python run_era5.py -o download   -c settings_scz.yml   # fetch NetCDF files from CDS
#   python run_era5.py -o process    -c settings_scz.yml   # extract point → CSV
#   python run_era5.py -o stats      -c settings_scz.yml   # descriptive / trend / uncertainty stats
#   python run_era5.py -o visualize  -c settings_scz.yml   # interactive HTML figures
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Time ─────────────────────────────────────────────────────────────────────
year_start: 1980
year_end:   2024
name: code_name

# ── Variables ─────────────────────────────────────────────────────────────────
# One or more variables (one CDS request per variable):
#   2m_temperature                     2m_dewpoint_temperature
#   total_precipitation
#   10m_u_component_of_wind            10m_v_component_of_wind
#   100m_u_component_of_wind           100m_v_component_of_wind
#   surface_solar_radiation_downwards  surface_net_solar_radiation
#   skin_temperature
variables: ["2m_temperature"]

# ── Domain mode ──────────────────────────────────────────────────────────────
# "point"  → nearest grid cell to lat/lon
# "area"   → bounding box
mode: point

# Point settings (used when mode = point)
lat:  -17.78
lon:  -63.18

# Area settings (used when mode = area)  [N, W, S, E]
area:
  north: -17.5
  west:  -63.5
  south: -18.25
  east:  -62.75

# ── Output ───────────────────────────────────────────────────────────────────
output_dir:  data/${name}
results_dir: results/${name}

# ── Physics constants ─────────────────────────────────────────────────────────
roughness_length: 0.03    # m  (open farmland – adjust for your site)
ref_height_low:   10.0    # m  (ERA-5 lowest wind level)
ref_height_high:  100.0   # m  (ERA-5 highest single-level wind level)
target_heights:   [10, 30, 50]  # m  – wind extrapolated to these heights via log profile

# ── Statistics (used by 'stats' command) ─────────────────────────────────────
rolling_window:   720     # hours  (~30 days); rolling mean/std window
n_boot:           500     # bootstrap resamples for uncertainty report (95 % CI)
